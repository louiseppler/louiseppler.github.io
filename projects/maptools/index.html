<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
        <style type="text/css">
      html, body, #map {
          width: 100%;
          height: 95%;
          margin: 0;
      }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <title>OpenLayers Demo</title>

  </head>
  <body>
    <div id="map" style="width: 100%; height: 100%;"></div>
    <br>
    <button id="add-question" type="button" class="btn btn-primary">Add Question</button>

    <button id="prev-polygon" type="button" class="btn btn-primary">Prev Polygon</button>
    <button id="next-polygon" type="button" class="btn btn-primary">Next Polygon</button>
    <button id="new-polygon" type="button" class="btn btn-primary">New Polygon</button>

    <div id="alert" class="popup" style="display: none;"></div>
    <div id="snackbar" class="snackbar" style="display: none;"></div>

    <div id="shapeList">
    </div>
  </body>
  <script src="dist/bundle.js"> </script>
</html>
