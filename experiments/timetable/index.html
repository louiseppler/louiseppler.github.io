<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="style.css">

    <title>Timetable</title>
    <script src="data.js"></script>
    <script src="canvasHelper.js"></script>
    <script src="stations.js"></script>
    <script src="second.js"></script>
    <script src="canvass.js"></script>
    <script src="main.js"></script>
    <script src="helpers.js"></script>
    <script src="stationSuggestion.js"></script>
    <script src="navigation.js"></script>
    <script>
        setupSizes();
    </script>
</head>

<body>
    <br><br><br>
    <div class="main-div" id="main-div">
       <h1>Timetable</h1>
       <div id="view-back-button">
            <a href="javascript:navigateBack()">back</a>
       </div>
       <div id="view-basic-search">
        <br>
            <div class="btn-group btn-group-sm segment-control" role="group" style="padding-bottom: 10px; padding-top: 0;">
            
            <input type="radio" class="btn-check" name="segment" id="basic" checked oninput="changeSearchType(0)">
            <label class="btn" for="basic">Basic</label>

            <input type="radio" class="btn-check" name="segment" id="duo" oninput="changeSearchType(1)">
            <label class="btn" for="duo">2 Departures</label>

            <input type="radio" class="btn-check" name="segment" id="advanced" oninput="changeSearchType(3)">
            <label class="btn" for="advanced">Via</label>

            </div>


            <div id="search-input-departure"></div>
            <div id="invert1-view">
                <div class="d-flex justify-content-end align-items-center">
                    <label class="form-check-label" style="padding-right: 5px; margin-bottom: -20px;" for="invert1">Reverse</label>
                    <input class="form-check-input" type="checkbox" id="invert1" style="margin-bottom: -20px;">
                </div>
            </div>
            
            <div id="search-input-departure2"></div>
            
            <div id="search-input-via"></div>

            <div id="invert2-view">
                <div class="d-flex justify-content-end align-items-center">
                    <label class="form-check-label" style="padding-right: 5px; margin-bottom: -20px;" for="invert2">Reverse</label>
                    <input class="form-check-input" type="checkbox" id="invert2" style="margin-bottom: -20px;">
                </div>
            </div>
            
            <div id="search-input-via2"></div>
            
          <div id="invert3-view">
                <div class="d-flex justify-content-end align-items-center">
                    <label class="form-check-label" style="padding-right: 5px; margin-bottom: -20px;" for="invert3">Reverse</label>
                    <input class="form-check-input" type="checkbox" id="invert3" style="margin-bottom: -20px;">
                </div>
            </div>
           
           <div id="search-input-arrival"></div>
           
            <div class="d-flex justify-content-start align-items-center mb-2"> 
                <div class="form-group" style="padding-right: 20px;">
                <label for="input-time">Time</label>
                <input type="time" class="form-control" id="input-time">
                </div>
                <div class="form-group">
                <label for="input-date">Date</label>
                <input type="date" class="form-control" id="input-date" style="width: 150;">
                </div>
            </div>

            <div class="d-flex justify-content-end align-items-center"> 
                <button type="submit" class="btn btn-primary" onclick="loadConnections()" style="width: 150px;">Submit</button>
            </div>

        </div>


        <br>
        <div id="view-error" style="display: none;">
            <div class="alert alert-danger" role="alert">
                <div id="error-message"></div>
            </div>
        </div>
        <br><br>


        <div id="loading" style="display: none;">
            <div class="spinner-border" role="status"></div>
        </div>
        <div class="d-flex justify-content-center">
            <div id="overview" style="display: none;">
        </div>
        </div> 
    



    </div>
        <div class="overflow-visible" id="graphic">
            <canvas id="canvas" style="position: absolute; z-index: 0;"></canvas>

            <table id="graphic-table" class="main-table" style="width: auto; position: absolute; z-index: 1;">
            <tr id="table-title"></tr>
            <tr id="table-content"></tr>
            </table>
        </div>
</div>

</body>
<script>
    setup();
</script>
</html>
